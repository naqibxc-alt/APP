<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Link Launcher - Drag & Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
min-height:100vh;
padding:30px;
color:#fff;
background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=1920');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
text-align:center;
font-size:3rem;
margin-bottom:10px;
background:linear-gradient(135deg,#fff7c7,#ffd700,#c89b2c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

.add-box{
max-width:1000px;
margin:auto;
display:flex;
gap:12px;
}

input{
flex:1;
padding:18px;
border-radius:18px;
border:1px solid rgba(255,215,0,.2);
background:rgba(255,255,255,.05);
color:#fff;
}

.btn{
padding:18px 24px;
border:none;
border-radius:18px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,#fff7c7,#ffd700,#c89b2c);
}

.apps{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.app{
position:relative;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,215,0,.15);
transition:.3s;
cursor:grab;
}

.app:hover{
transform:translateY(-5px);
}

.app img{
width:90px;
height:90px;
background:#fff;
padding:10px;
border-radius:20px;
}

.app a{
text-decoration:none;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

.app-name{
margin-top:15px;
text-align:center;
}

.actions{
position:absolute;
top:10px;
right:10px;
display:flex;
gap:5px;
}

.actions button{
width:30px;
height:30px;
border:none;
border-radius:50%;
cursor:pointer;
color:#fff;
}

.edit{background:#ffb300}
.delete{background:#ff3b30}

.sortable-ghost{
opacity:.3;
}

.empty{
grid-column:1/-1;
text-align:center;
color:#999;
}
</style>
</head>
<body>

<h1>Premium Link Launcher</h1>
<p class="subtitle">Drag & Drop to rearrange apps</p>

<div class="add-box">
<input id="urlInput" placeholder="https://example.com">
<button class="btn" onclick="addApp()">Add App</button>
<button class="btn" onclick="resetApps()">Reset</button>
</div>

<div class="apps" id="apps"></div>

<script>
const defaultApps=[
{url:"https://anidap.se/home",name:"ANIDAP"},
{url:"https://reanime.to/home",name:"ReAnime"},
{url:"https://animetsu.net/",name:"Animetsu"},
{url:"https://anime.uniquestream.net/",name:"UniqueStream"},
{url:"https://anime.nexus/",name:"Anime Nexus"},
{url:"https://moviebox.ph/",name:"MovieBox"},
{url:"https://atsu.moe/",name:"Atsu"},
{url:"https://kajzu.com/z/",name:"Kajzu"},
{url:"https://tukoz.com/t/",name:"Tukoz"},
{url:"https://naqibxc-alt.github.io/link/",name:"Naqib Link"},
{url:"https://www.lapakgaming.com/en-my",name:"Lapak Gaming"},
{url:"https://www.kachishop.com/my/",name:"Kachi Shop"},
{url:"https://www.codashop.com/en-my/",name:"Codashop"},
{url:"https://chatgpt.com/",name:"ChatGPT"},
{url:"https://gemini.google.com/app",name:"Gemini"},
{url:"https://claude.ai/login",name:"Claude"},
{url:"https://copilot.microsoft.com/",name:"Copilot"},
{url:"https://grok.com/",name:"Grok"},
{url:"https://www.perplexity.ai/",name:"Perplexity"},
{url:"https://www.deepseek.com/en/",name:"DeepSeek"}
];

let apps=JSON.parse(localStorage.getItem("premiumApps"));

if(!apps){
apps=[...defaultApps];
save();
}

function save(){
localStorage.setItem("premiumApps",JSON.stringify(apps));
}

function getDomain(url){
try{return new URL(url).hostname}catch{return ""}
}

function renderApps(){

const container=document.getElementById("apps");
container.innerHTML="";

apps.forEach((app,index)=>{

const domain=getDomain(app.url);
const icon=`https://www.google.com/s2/favicons?domain=${domain}&sz=256`;

const card=document.createElement("div");
card.className="app";
card.dataset.index=index;

card.innerHTML=`
<div class="actions">
<button class="edit" onclick="renameApp(${index})">✎</button>
<button class="delete" onclick="deleteApp(${index})">✕</button>
</div>

<a href="${app.url}" target="_blank">
<img src="${icon}">
<div class="app-name">${app.name}</div>
</a>
`;

container.appendChild(card);
});

new Sortable(container,{
animation:200,
onEnd:function(evt){

const moved=apps.splice(evt.oldIndex,1)[0];
apps.splice(evt.newIndex,0,moved);

save();
renderApps();

}
});

}

function addApp(){

let url=document.getElementById("urlInput").value.trim();

if(!url)return;

if(!url.startsWith("http")){
url="https://"+url;
}

const name=prompt("App Name")||getDomain(url);

apps.push({url,name});

save();
renderApps();

document.getElementById("urlInput").value="";
}

function renameApp(index){

const name=prompt("New Name",apps[index].name);

if(!name)return;

apps[index].name=name;

save();
renderApps();

}

function deleteApp(index){

apps.splice(index,1);

save();
renderApps();

}

function resetApps(){

if(confirm("Reset all apps?")){

apps=[...defaultApps];

save();
renderApps();

}

}

renderApps();
</script>

</body>
</html>
